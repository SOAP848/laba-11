name: Build and Push Docker Images

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Allow manual trigger

env:
  REGISTRY: ghcr.io
  # GitHub repository owner and name
  IMAGE_NAMESPACE: ${{ github.repository_owner }}

# Required permissions for pushing to GitHub Container Registry
permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    # Set permissions for this job
    permissions:
      contents: read
      packages: write
      id-token: write  # Required for OIDC authentication
    
    strategy:
      matrix:
        project:
          - name: go-app
            context: ./hard/go_project
            dockerfile: ./hard/go_project/Dockerfile
            image_name: go-app
          - name: python-app
            context: ./mid/python_app
            dockerfile: ./mid/python_app/Dockerfile
            image_name: python-app
          - name: rust-app
            context: ./mid/Rust_app
            dockerfile: ./mid/Rust_app/Dockerfile
            image_name: rust-app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.project.image_name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
          labels: |
            org.opencontainers.image.title=${{ matrix.project.name }}
            org.opencontainers.image.description="Docker image for ${{ matrix.project.name }}"
            org.opencontainers.image.url=https://github.com/${{ github.repository }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ github.sha }}
            org.opencontainers.image.created=${{ steps.prep.outputs.created }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.licenses=MIT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.project.context }}
          file: ${{ matrix.project.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run tests for Go application
        if: matrix.project.name == 'go-app'
        run: |
          cd hard/go_project
          go test -v ./...

      - name: Run tests for Python application
        if: matrix.project.name == 'python-app'
        run: |
          cd mid/python_app
          python -m unittest test_app.py -v

      - name: Run tests for Rust application
        if: matrix.project.name == 'rust-app'
        run: |
          cd mid/Rust_app
          cargo test --release --verbose

  deploy-notification:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name != 'pull_request'
    steps:
      - name: Send notification
        run: |
          echo "Docker images built and pushed successfully for all projects!"
          echo "Images:"
          echo "- ghcr.io/${{ env.IMAGE_NAMESPACE }}/go-app"
          echo "- ghcr.io/${{ env.IMAGE_NAMESPACE }}/python-app"
          echo "- ghcr.io/${{ env.IMAGE_NAMESPACE }}/rust-app"