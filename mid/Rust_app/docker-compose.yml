version: '3.8'

services:
  rust_app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rust_app_container
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - HOST=0.0.0.0
      - ENV=production
    # Ограничения ресурсов
    deploy:
      resources:
        limits:
          cpus: '1.0'          # Ограничение до 1 CPU ядра
          memory: 512M         # Ограничение памяти до 512 МБ
        reservations:
          cpus: '0.2'          # Резервирование минимум 0.2 CPU
          memory: 256M         # Резервирование минимум 256 МБ памяти
 
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - app_network

networks:
  app_network:
    driver: bridge