version: '3.8'

services:
  python_app:
    build:
      context: ./python_app
      dockerfile: Dockerfile
    container_name: python_app_mid
    ports:
      - "5000:5000"
    environment:
      - FLASK_APP=app.py
      - FLASK_ENV=production
      - PORT=5000
      - HOST=0.0.0.0
    # Ограничения ресурсов
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M
    restart: unless-stopped
    networks:
      - mid_network
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:5000/health', timeout=2) || exit(1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  rust_app:
    build:
      context: ./Rust_app
      dockerfile: Dockerfile
    container_name: rust_app_mid
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - HOST=0.0.0.0
      - ENV=production
    # Ограничения ресурсов
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.2'
          memory: 256M
    restart: unless-stopped
    networks:
      - mid_network
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  mid_network:
    driver: bridge