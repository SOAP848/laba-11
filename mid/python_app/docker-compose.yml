version: '3.8'

services:
  python_app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: python_app_container
    ports:
      - "5000:5000"
    environment:
      - FLASK_APP=app.py
      - FLASK_ENV=production
      - PORT=5000
      - HOST=0.0.0.0
    # Ограничения ресурсов
    deploy:
      resources:
        limits:
          cpus: '0.5'          # Ограничение до 0.5 CPU ядра
          memory: 256M         # Ограничение памяти до 256 МБ
        reservations:
          cpus: '0.1'          # Резервирование минимум 0.1 CPU
          memory: 128M         # Резервирование минимум 128 МБ памяти

    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:5000/health', timeout=2) || exit(1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - app_network

networks:
  app_network:
    driver: bridge